name: Build Flask App (Preview)

on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile sources
        run: python -m compileall -q .

      - name: Package app
        run: |
          mkdir -p build_artifact
          cp -r app config.py run.py requirements.txt build_artifact/
          if [ -f app.db ]; then cp app.db build_artifact/; fi
          tar -czf app_artifact.tar.gz build_artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flask-app
          path: app_artifact.tar.gz